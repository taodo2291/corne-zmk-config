# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano@2.0.0//zmk" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano@2.0.0//zmk
#     shield: reviung41
#
---
include:
  # Clean builds (no ZMK Studio) — use these for stable, flash-override-free firmware
  - board: nice_nano@2.0.0//zmk
    shield: corne_left
    artifact-name: corne_left
  - board: nice_nano@2.0.0//zmk
    shield: corne_right
    artifact-name: corne_right
  # Studio builds — only use if you need real-time key remapping via ZMK Studio app
  - board: nice_nano@2.0.0//zmk
    shield: corne_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne_left_studio
  - board: nice_nano@2.0.0//zmk
    shield: corne_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne_right_studio
  # Flash this to BOTH halves first to wipe ZMK Studio's stored layout
  - board: nice_nano@2.0.0//zmk
    shield: settings_reset
    artifact-name: settings_reset
